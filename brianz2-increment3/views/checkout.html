<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Brian Zhang">
  <meta name="keywords" content="MonoMuse, tea museum, buy tickets, checkout, order">
  <meta name="description" content="Buy tickets to MonoMuse Tea Museum — secure your entry online in about two minutes.">
  <title>MonoMuse Tea Museum — Checkout</title>

  <!-- Google Fonts: Cormorant Garamond + Jost -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../static/style.css">
  <script src="../static/script.js" defer></script>
</head>
<body>

  <!-- HEADER -->
  <header>
    <a href="../index.html" aria-label="MonoMuse Tea Museum — home">
      <img id="logo" src="../static/images/new-tea-logo.png" alt="MonoMuse Tea Museum Logo">
    </a>
  </header>

  <!-- NAVIGATION -->
  <nav aria-label="Main navigation">
    <a href="../index.html">Home</a>
    <a href="explore.html">Explore</a>
    <a href="exhibitions.html">Exhibitions</a>
    <a href="tickets.html">Tickets</a>
    <a href="checkout.html" class="nav-cta">Buy Tickets</a>
  </nav>

  <!-- MAIN -->
  <main class="main">

    <h1>Secure Your Ticket</h1>
    <p>Book online, skip the queue. Purchasing in advance takes about two minutes and guarantees
       your entry. Fields marked with * are required.</p>

    <form>
      <label for="visit-date">Visit Date *</label>
      <input type="date" id="visit-date" name="visit-date" required>

      <label for="ticket-type">Ticket Type *</label>
      <select id="ticket-type" name="ticket-type" required>
        <option value="">— Select a ticket type —</option>
        <option value="general">General Admission — $18.00</option>
        <option value="student">Student — $10.00 (valid ID required)</option>
        <option value="member">Member — Free (membership card required)</option>
      </select>

      <label for="quantity">Quantity * (1&ndash;10)</label>
      <input type="number" id="quantity" name="quantity" min="1" max="10" required placeholder="Enter quantity">

      <label for="email">Email Address *</label>
      <input type="email" id="email" name="email" required placeholder="you@example.com">

      <label for="zip">Zip Code (optional)</label>
      <input type="text" id="zip" name="zip" maxlength="5" placeholder="e.g. 15222">

      <div style="margin-top: 1rem;">
        <input type="checkbox" id="mailing-list" name="mailing-list"
               style="width: auto; min-height: auto; display: inline; margin-right: 0.5rem;">
        <label for="mailing-list" style="display: inline; text-transform: none; letter-spacing: 0; font-size: 0.9rem;">
          Sign me up for exhibition news and programming updates
        </label>
      </div>

      <button type="submit">Place Order</button>
    </form>

  </main>

  <!-- FOOTER -->
  <footer>
    <p id="copyYear"></p>
    <p style="margin-top: 0.4rem;">
      <a href="../index.html">Home</a> &middot;
      <a href="tickets.html">Tickets</a> &middot;
      <a href="exhibitions.html">Exhibitions</a> &middot;
      <a href="explore.html#directions">Directions</a>
    </p>
  </footer>

</body>
</html>
